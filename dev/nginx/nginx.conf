user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" tenant="$http_x_tenant_id" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Rate Limiting Zones
    # Pro IP (global, verhindert Brute-Force)
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=60r/m;
    # Pro IP für Auth-Endpunkte (strenger)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # Pro Tenant (verhindert Missbrauch durch einzelne Tenants)
    limit_req_zone $http_x_tenant_id zone=tenant_limit:10m rate=600r/m;

    # Upstreams
    upstream core {
        server core:8000;
        keepalive 32;
    }

    upstream orders {
        server orders:8001;
        keepalive 32;
    }

    upstream ai {
        server ai:8002;
        keepalive 16;
    }

    upstream notifications {
        server notifications:8003;
        keepalive 8;
    }

    upstream web {
        server web:3000;
        keepalive 8;
    }

    upstream dashboard {
        server dashboard:3001;
        keepalive 8;
    }

    # Proxy-Einstellungen
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    include /etc/nginx/conf.d/*.conf;
}

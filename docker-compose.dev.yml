# =============================================================================
# GastroPilot – Microservices Development Stack
# =============================================================================
# Lokale Entwicklungsumgebung mit allen 4 Services + nginx + postgres + redis
# Alle Services mit Hot-Reload für schnelle Entwicklung.
#
# Voraussetzung: .env-Datei anlegen (siehe .env.example)
#
# Starten:    docker compose -f docker-compose.dev.yml up -d
# Stoppen:    docker compose -f docker-compose.dev.yml down
# Logs:       docker compose -f docker-compose.dev.yml logs -f [service]
# Migration:  docker compose -f docker-compose.dev.yml exec core alembic upgrade head
#
# Services:
#   - nginx:         http://localhost:80   (Reverse Proxy)
#   - Frontend:      http://localhost:3001
#   - Core:          http://localhost:8000  (via nginx)
#   - Orders:        http://localhost:8001  (via nginx)
#   - AI:            http://localhost:8002  (via nginx)
#   - Notifications: http://localhost:8003  (via nginx)
#   - Database:      localhost:5432
#   - Redis:         localhost:6379
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastruktur
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: gp-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gastropilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gastropilot}
      POSTGRES_DB: ${POSTGRES_DB:-gastropilot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infra/sql/rls.sql:/docker-entrypoint-initdb.d/02_rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gastropilot} -d ${POSTGRES_DB:-gastropilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: gp-dev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Core Service (Auth, Users, Restaurants, Reservierungen, Menü)
  # ---------------------------------------------------------------------------
  core:
    build:
      context: ./backend
      dockerfile: services/core/Dockerfile
    container_name: gp-dev-core
    restart: unless-stopped
    env_file: ./backend/services/core/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gastropilot}:${POSTGRES_PASSWORD:-gastropilot}@postgres:5432/${POSTGRES_DB:-gastropilot}
      DATABASE_ADMIN_URL: postgresql+asyncpg://${POSTGRES_USER:-gastropilot}:${POSTGRES_PASSWORD:-gastropilot}@postgres:5432/${POSTGRES_DB:-gastropilot}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-gastropilot}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-gastropilot123}
      MINIO_BUCKET: gastropilot-uploads
      MINIO_PUBLIC_URL: http://localhost:9000/gastropilot-uploads
    volumes:
      - ./backend/services/core/app:/app/app
      - ./backend/packages:/packages
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Orders Service (Bestellungen, Kitchen, WebSocket, SumUp)
  # ---------------------------------------------------------------------------
  orders:
    build:
      context: ./backend
      dockerfile: services/orders/Dockerfile
    container_name: gp-dev-orders
    restart: unless-stopped
    env_file: ./backend/services/orders/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gastropilot}:${POSTGRES_PASSWORD:-gastropilot}@postgres:5432/${POSTGRES_DB:-gastropilot}
      DATABASE_ADMIN_URL: postgresql+asyncpg://${POSTGRES_USER:-gastropilot}:${POSTGRES_PASSWORD:-gastropilot}@postgres:5432/${POSTGRES_DB:-gastropilot}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend/services/orders/app:/app/app
      - ./backend/packages:/packages
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/orders/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # AI Service (Sitzplatz-Optimierung, Peak-Prognose, Empfehlungen)
  # ---------------------------------------------------------------------------
  ai:
    build:
      context: ./backend
      dockerfile: services/ai/Dockerfile
    container_name: gp-dev-ai
    restart: unless-stopped
    env_file: ./backend/services/ai/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend/services/ai/app:/app/app
      - ./backend/packages:/packages
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/v1/ai/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Notifications Service (E-Mail, SMS, WhatsApp via Celery)
  # ---------------------------------------------------------------------------
  notifications:
    build:
      context: ./backend
      dockerfile: services/notifications/Dockerfile
    container_name: gp-dev-notifications
    restart: unless-stopped
    env_file: ./backend/services/notifications/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: development
    volumes:
      - ./backend/services/notifications/app:/app/app
      - ./backend/packages:/packages
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/api/v1/notifications/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # Celery Worker für Notifications
  notifications-worker:
    build:
      context: ./backend
      dockerfile: services/notifications/Dockerfile
    container_name: gp-dev-notifications-worker
    restart: unless-stopped
    env_file: ./backend/services/notifications/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: development
    volumes:
      - ./backend/services/notifications/app:/app/app
      - ./backend/packages:/packages
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: gp-dev-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - core
      - orders
      - ai
      - notifications
      - frontend
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Frontend (Next.js mit Hot Reload) – Restaurant Dashboard
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: deps
    container_name: gp-dev-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${HTTP_PORT:-80}
      SSR_API_BASE_URL: http://nginx:80
      NEXT_PUBLIC_API_PREFIX: api/v1
    volumes:
      - ./web/app:/app/app
      - ./web/components:/app/components
      - ./web/lib:/app/lib
      - ./web/hooks:/app/hooks
      - ./web/public:/app/public
      - ./web/tsconfig.json:/app/tsconfig.json
      - ./web/next.config.ts:/app/next.config.ts
      - ./web/postcss.config.mjs:/app/postcss.config.mjs
      - ./web/tailwind.config.ts:/app/tailwind.config.ts
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Guest Portal (Next.js SSR) – Gast Web-Portal
  # ---------------------------------------------------------------------------
  guest-portal:
    build:
      context: ./guest-portal
      dockerfile: Dockerfile
      target: deps
    container_name: gp-dev-guest-portal
    restart: unless-stopped
    ports:
      - "${GUEST_PORTAL_PORT:-3002}:3002"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${HTTP_PORT:-80}
      SSR_API_BASE_URL: http://nginx:80
      NEXT_PUBLIC_API_PREFIX: api/v1
    volumes:
      - ./guest-portal/app:/app/app
      - ./guest-portal/components:/app/components
      - ./guest-portal/lib:/app/lib
      - ./guest-portal/public:/app/public
      - ./guest-portal/tsconfig.json:/app/tsconfig.json
      - ./guest-portal/next.config.ts:/app/next.config.ts
      - ./guest-portal/postcss.config.mjs:/app/postcss.config.mjs
      - ./guest-portal/i18n:/app/i18n
      - ./guest-portal/messages:/app/messages
      - ./guest-portal/middleware.ts:/app/middleware.ts
      - /app/node_modules
      - /app/.next
    depends_on:
      - nginx
    command: sh -c "npm install && npm run dev"
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Table Order (Next.js PWA) – QR-Code-Bestellen am Tisch
  # ---------------------------------------------------------------------------
  table-order:
    build:
      context: ./table-order
      dockerfile: Dockerfile
      target: deps
    container_name: gp-dev-table-order
    restart: unless-stopped
    ports:
      - "${TABLE_ORDER_PORT:-3003}:3003"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${HTTP_PORT:-80}
      SSR_API_BASE_URL: http://nginx:80
      NEXT_PUBLIC_API_PREFIX: api/v1
    volumes:
      - ./table-order/app:/app/app
      - ./table-order/components:/app/components
      - ./table-order/lib:/app/lib
      - ./table-order/public:/app/public
      - ./table-order/tsconfig.json:/app/tsconfig.json
      - ./table-order/next.config.ts:/app/next.config.ts
      - ./table-order/postcss.config.mjs:/app/postcss.config.mjs
      - /app/node_modules
      - /app/.next
    depends_on:
      - nginx
    command: sh -c "npm install && npm run dev"
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # KDS Standalone (Next.js) – Kitchen Display System
  # ---------------------------------------------------------------------------
  kds:
    build:
      context: ./kds
      dockerfile: Dockerfile
      target: deps
    container_name: gp-dev-kds
    restart: unless-stopped
    ports:
      - "${KDS_PORT:-3004}:3004"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${HTTP_PORT:-80}
      SSR_API_BASE_URL: http://nginx:80
      NEXT_PUBLIC_API_PREFIX: api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:${HTTP_PORT:-80}/ws
    volumes:
      - ./kds/app:/app/app
      - ./kds/components:/app/components
      - ./kds/lib:/app/lib
      - ./kds/public:/app/public
      - ./kds/tsconfig.json:/app/tsconfig.json
      - ./kds/next.config.ts:/app/next.config.ts
      - ./kds/postcss.config.mjs:/app/postcss.config.mjs
      - /app/node_modules
      - /app/.next
    depends_on:
      - nginx
    command: sh -c "npm install && npm run dev"
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Minio (S3-kompatibler Object Storage für Bilder)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: gp-dev-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-gastropilot}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-gastropilot123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

networks:
  internal:
    driver: bridge
    name: gastropilot-dev

volumes:
  postgres_data:
    name: gastropilot-dev-postgres-data
  redis_data:
    name: gastropilot-dev-redis-data
  minio_data:
    name: gastropilot-dev-minio-data

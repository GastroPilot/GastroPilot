name: CI

on:
  push:
    branches:
      - 'fix/**'
      - 'feat/**'
  pull_request:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:

  # ============================================
  # Next.js Frontend Tests
  # ============================================

  test-frontend:
    name: Test Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gastropilot-frontend
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './gastropilot-frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run

  # ============================================
  # Python Backend Tests
  # ============================================

  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gastropilot-backend
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: './gastropilot-backend/requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        run: pytest -m "not integration"

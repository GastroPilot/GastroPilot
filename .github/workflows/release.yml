name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      deploy_to_production:
        description: 'Deploy to production after release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

# Prevent concurrent releases to avoid conflicts
concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '20'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION)
          else
            CURRENT_VERSION="0.0.0"
          fi
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"

          # Parse version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > VERSION
          git add VERSION

      - name: Update submodule VERSION files
        run: |
          # Update frontend VERSION
          if [ -d "gastropilot-frontend" ]; then
            echo "${{ steps.bump.outputs.new_version }}" > gastropilot-frontend/VERSION 2>/dev/null || true
          fi

          # Update backend VERSION
          if [ -d "gastropilot-backend" ]; then
            echo "${{ steps.bump.outputs.new_version }}" > gastropilot-backend/VERSION 2>/dev/null || true
          fi

          # Update app VERSION
          if [ -d "gastropilot-app" ]; then
            echo "${{ steps.bump.outputs.new_version }}" > gastropilot-app/VERSION 2>/dev/null || true
          fi

      - name: Generate changelog entry
        id: changelog
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          RELEASE_DATE=$(date +%Y-%m-%d)

          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges | head -50)
          fi

          # Create changelog entry
          ENTRY="## [${NEW_VERSION}] - ${RELEASE_DATE}

          ### Changes
          ${COMMITS}

          "

          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Read existing content, skip the header
            EXISTING=$(tail -n +3 CHANGELOG.md)
            echo "# Changelog

          ${ENTRY}
          ${EXISTING}" > CHANGELOG.md
          else
            echo "# Changelog

          ${ENTRY}" > CHANGELOG.md
          fi

          git add CHANGELOG.md

          # Save for release notes
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "${ENTRY}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git commit -m "chore(release): ${{ steps.bump.outputs.new_version }}"

      - name: Push changes and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git to use GITHUB_TOKEN for push (has write access to this repo)
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          # Pull latest changes and rebase our commit on top
          git pull --rebase origin main
          
          # Push the commit
          git push
          
          # Create and push the tag
          git tag -a "${{ steps.bump.outputs.release_tag }}" -m "Release ${{ steps.bump.outputs.new_version }}"
          git push origin "${{ steps.bump.outputs.release_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump.outputs.release_tag }}
          name: Release ${{ steps.bump.outputs.new_version }}
          body: ${{ steps.changelog.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-tag:
    name: Build & Tag Release Images
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ needs.release.outputs.release_tag }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./gastropilot-frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/gastropilot/gastropilot-frontend:${{ needs.release.outputs.release_tag }}
            ${{ env.REGISTRY }}/gastropilot/gastropilot-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.release.outputs.new_version }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./gastropilot-backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/gastropilot/gastropilot-backend:${{ needs.release.outputs.release_tag }}
            ${{ env.REGISTRY }}/gastropilot/gastropilot-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Expo Web App
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './gastropilot-app/package-lock.json'

      - name: Install App dependencies
        working-directory: ./gastropilot-app
        run: npm ci

      - name: Build Expo Web App
        working-directory: ./gastropilot-app
        env:
          EXPO_PUBLIC_API_URL: https://api.gpilot.app/v1
          EXPO_PUBLIC_MOTHERSHIP_URL: https://mothership.gastropilot.org/prod/v1
        run: npx expo export --platform web --output-dir dist

      - name: Create App deployment package
        working-directory: ./gastropilot-app
        run: |
          tar -czf ../expo-web-release.tar.gz -C dist .

      - name: Upload App build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: expo-web-release-${{ needs.release.outputs.release_tag }}
          path: expo-web-release.tar.gz
          retention-days: 90

  # ============================================
  # iOS Build - Deaktiviert (Apple Developer License erforderlich)
  # ============================================

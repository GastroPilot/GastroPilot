name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Versions-Typ: patch (0.13.0 → 0.13.1), minor (0.13.0 → 0.14.0), major (0.13.0 → 1.0.0)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      deploy_to_production:
        description: 'Nach dem Release automatisch auf Production deployen? (Watchtower zieht :latest Images)'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  DOCKERHUB_ORG: servecta

jobs:
  # ============================================
  # 1. Release erstellen (Version bump, Tag, Changelog)
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION)
          else
            CURRENT_VERSION="0.0.0"
          fi
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: bump
        env:
          CURRENT: ${{ steps.current.outputs.version }}
          BUMP_TYPE: ${{ github.event.inputs.version_bump }}
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update VERSION files
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > VERSION
          git add VERSION

          for dir in web backend guest-portal kds table-order; do
            if [ -d "$dir" ]; then
              echo "${{ steps.bump.outputs.new_version }}" > "$dir/VERSION" 2>/dev/null || true
            fi
          done

      - name: Generate changelog entry
        id: changelog
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          RELEASE_DATE=$(date +%Y-%m-%d)

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges | head -50)
          fi

          ENTRY="## [${NEW_VERSION}] - ${RELEASE_DATE}

          ### Changes
          ${COMMITS}

          "

          if [ -f CHANGELOG.md ]; then
            EXISTING=$(tail -n +3 CHANGELOG.md)
            echo "# Changelog

          ${ENTRY}
          ${EXISTING}" > CHANGELOG.md
          else
            echo "# Changelog

          ${ENTRY}" > CHANGELOG.md
          fi

          git add CHANGELOG.md

          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "${ENTRY}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git commit -m "chore(release): ${{ steps.bump.outputs.new_version }}"

      - name: Push changes and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase origin main
          git push

          git tag -a "${{ steps.bump.outputs.release_tag }}" -m "Release ${{ steps.bump.outputs.new_version }}"
          git push origin "${{ steps.bump.outputs.release_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump.outputs.release_tag }}
          name: Release ${{ steps.bump.outputs.new_version }}
          body: ${{ steps.changelog.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # 2. Frontend Images bauen (parallel)
  # ============================================
  build-frontend:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            image: gastropilot-web
            context: ./web
          - app: guest-portal
            image: gastropilot-guest-portal
            context: ./guest-portal
          - app: kds
            image: gastropilot-kds
            context: ./kds
          - app: table-order
            image: gastropilot-table-order
            context: ./table-order
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ needs.release.outputs.release_tag }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:production
          cache-from: type=gha,scope=${{ matrix.app }}-production
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-production
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.release.outputs.new_version }}

  # ============================================
  # 3. Backend Images bauen (parallel)
  # ============================================
  build-backend:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: core
            image: gastropilot-core
            dockerfile: services/core/Dockerfile
          - service: orders
            image: gastropilot-orders
            dockerfile: services/orders/Dockerfile
          - service: ai
            image: gastropilot-ai
            dockerfile: services/ai/Dockerfile
          - service: notifications
            image: gastropilot-notifications
            dockerfile: services/notifications/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ needs.release.outputs.release_tag }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:production
          cache-from: type=gha,scope=${{ matrix.service }}-production
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-production

  # ============================================
  # 4. Production Deploy (optional)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [release, build-frontend, build-backend]
    if: github.event.inputs.deploy_to_production == 'true'
    environment:
      name: production
      url: https://gpilot.app
    steps:
      - name: Notify Slack about Release
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \":rocket: GastroPilot Release ${{ needs.release.outputs.release_tag }}\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Version:* ${{ needs.release.outputs.new_version }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Environment:* Production\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Released by:* ${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"<${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.release.outputs.release_tag }}|View Release>\"
                    }
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

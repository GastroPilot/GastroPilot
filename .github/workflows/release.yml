name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'promote = aktuelle RC zur Production machen, patch/minor/major = direkter Release (Hotfix)'
        required: true
        type: choice
        options:
          - promote
          - patch
          - minor
          - major
      deploy_to_production:
        description: 'Nach dem Release automatisch auf Production deployen? (Watchtower zieht :latest Images)'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  DOCKERHUB_ORG: servecta

jobs:
  # ============================================
  # 1. Release erstellen
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine release version
        id: version
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0")
          CURRENT_VERSION=$(echo "$CURRENT_VERSION" | tr -d '[:space:]')
          echo "Current VERSION: $CURRENT_VERSION"

          if [ "$RELEASE_TYPE" = "promote" ]; then
            # Promote: RC-Suffix entfernen (z.B. 0.14.3-rc.4 → 0.14.3)
            if [[ "$CURRENT_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-rc\.[0-9]+$ ]]; then
              NEW_VERSION="${BASH_REMATCH[1]}"
              echo "Promote: ${CURRENT_VERSION} → ${NEW_VERSION}"
            else
              echo "Fehler: VERSION '$CURRENT_VERSION' enthält keine RC. Nutze patch/minor/major statt promote." >&2
              exit 1
            fi
          else
            # Direkter Release (Hotfix): RC-Suffix ignorieren, Basis bumpen
            if [[ "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-rc\.[0-9]+)?$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
            else
              echo "Fehler: VERSION '$CURRENT_VERSION' hat ungültiges Format." >&2
              exit 1
            fi

            case "$RELEASE_TYPE" in
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            esac
            echo "Direct release: ${CURRENT_VERSION} → ${NEW_VERSION}"
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update VERSION files
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          echo "$NEW_VERSION" > VERSION
          git add VERSION

          for dir in web backend kds table-order; do
            if [ -d "$dir" ]; then
              echo "$NEW_VERSION" > "$dir/VERSION" 2>/dev/null || true
            fi
          done

      - name: Generate changelog entry
        id: changelog
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges | head -50)
          fi

          ENTRY="## [${NEW_VERSION}] - ${RELEASE_DATE}

### Changes
${COMMITS}

"

          if [ -f CHANGELOG.md ]; then
            EXISTING=$(tail -n +3 CHANGELOG.md)
            printf "# Changelog\n\n%s\n%s" "$ENTRY" "$EXISTING" > CHANGELOG.md
          else
            printf "# Changelog\n\n%s" "$ENTRY" > CHANGELOG.md
          fi

          git add CHANGELOG.md

          {
            echo "RELEASE_NOTES<<EOF"
            echo "$ENTRY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git commit -m "chore(release): ${NEW_VERSION}"

      - name: Push changes and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git pull --rebase origin main
          git push
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: Release ${{ steps.version.outputs.new_version }}
          body: ${{ steps.changelog.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # 2. Frontend Images bauen (parallel)
  # ============================================
  build-frontend:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            image: gastropilot-web
            context: ./web
          - app: dashboard
            image: gastropilot-dashboard
            context: ./dashboard
          - app: kds
            image: gastropilot-kds
            context: ./kds
          - app: table-order
            image: gastropilot-table-order
            context: ./table-order
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ needs.release.outputs.release_tag }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build date
        id: meta
        run: echo "build_date=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:production
          cache-from: type=gha,scope=${{ matrix.app }}-production
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-production
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.release.outputs.new_version }}
            NEXT_PUBLIC_BUILD_DATE=${{ steps.meta.outputs.build_date }}

  # ============================================
  # 3. Backend Images bauen (parallel)
  # ============================================
  build-backend:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: core
            image: gastropilot-core
            dockerfile: services/core/Dockerfile
          - service: orders
            image: gastropilot-orders
            dockerfile: services/orders/Dockerfile
          - service: ai
            image: gastropilot-ai
            dockerfile: services/ai/Dockerfile
          - service: notifications
            image: gastropilot-notifications
            dockerfile: services/notifications/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ needs.release.outputs.release_tag }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:production
          cache-from: type=gha,scope=${{ matrix.service }}-production
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-production

  # ============================================
  # 4. Production Deploy (optional)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [release, build-frontend, build-backend]
    if: github.event.inputs.deploy_to_production == 'true'
    environment:
      name: production
      url: https://gpilot.app
    steps:
      - name: Notify Slack about Release
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NEW_VERSION: ${{ needs.release.outputs.new_version }}
          RELEASE_TAG: ${{ needs.release.outputs.release_tag }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \":rocket: GastroPilot Release ${RELEASE_TAG}\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Version:* ${NEW_VERSION}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Environment:* Production\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Released by:* ${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"<${{ github.server_url }}/${{ github.repository }}/releases/tag/${RELEASE_TAG}|View Release>\"
                    }
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

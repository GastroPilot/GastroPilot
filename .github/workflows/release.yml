name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      deploy_to_production:
        description: 'Deploy to production after release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

# Prevent concurrent releases to avoid conflicts
concurrency:
  group: release
  cancel-in-progress: false

env:
  DOCKERHUB_ORG: servecta
  NODE_VERSION: '20'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION)
          else
            CURRENT_VERSION="0.0.0"
          fi
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"

          # Parse version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > VERSION
          git add VERSION

      - name: Update submodule VERSION files
        run: |
          # Update frontend VERSION
          if [ -d "web" ]; then
            echo "${{ steps.bump.outputs.new_version }}" > web/VERSION 2>/dev/null || true
          fi

          # Update backend VERSION
          if [ -d "backend" ]; then
            echo "${{ steps.bump.outputs.new_version }}" > backend/VERSION 2>/dev/null || true
          fi

          # Update new app VERSION files
          for dir in guest-portal kds table-order; do
            if [ -d "$dir" ]; then
              echo "${{ steps.bump.outputs.new_version }}" > "$dir/VERSION" 2>/dev/null || true
            fi
          done

      - name: Generate changelog entry
        id: changelog
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          RELEASE_DATE=$(date +%Y-%m-%d)

          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges | head -50)
          fi

          # Create changelog entry
          ENTRY="## [${NEW_VERSION}] - ${RELEASE_DATE}

          ### Changes
          ${COMMITS}

          "

          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Read existing content, skip the header
            EXISTING=$(tail -n +3 CHANGELOG.md)
            echo "# Changelog

          ${ENTRY}
          ${EXISTING}" > CHANGELOG.md
          else
            echo "# Changelog

          ${ENTRY}" > CHANGELOG.md
          fi

          git add CHANGELOG.md

          # Save for release notes
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "${ENTRY}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git commit -m "chore(release): ${{ steps.bump.outputs.new_version }}"

      - name: Push changes and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git to use GITHUB_TOKEN for push (has write access to this repo)
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          # Pull latest changes and rebase our commit on top
          git pull --rebase origin main

          # Push the commit
          git push

          # Create and push the tag
          git tag -a "${{ steps.bump.outputs.release_tag }}" -m "Release ${{ steps.bump.outputs.new_version }}"
          git push origin "${{ steps.bump.outputs.release_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump.outputs.release_tag }}
          name: Release ${{ steps.bump.outputs.new_version }}
          body: ${{ steps.changelog.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-tag:
    name: Build & Tag Release Images
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ needs.release.outputs.release_tag }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ============================================
      # Frontend Apps (with NEXT_PUBLIC_APP_VERSION)
      # ============================================

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-web:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-web:production
          cache-from: type=gha,scope=frontend-production
          cache-to: type=gha,mode=max,scope=frontend-production
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.release.outputs.new_version }}

      - name: Build and push Guest Portal
        uses: docker/build-push-action@v5
        with:
          context: ./guest-portal
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-guest-portal:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-guest-portal:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-guest-portal:production
          cache-from: type=gha,scope=guest-portal-production
          cache-to: type=gha,mode=max,scope=guest-portal-production
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.release.outputs.new_version }}

      - name: Build and push KDS
        uses: docker/build-push-action@v5
        with:
          context: ./kds
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-kds:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-kds:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-kds:production
          cache-from: type=gha,scope=kds-production
          cache-to: type=gha,mode=max,scope=kds-production
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.release.outputs.new_version }}

      - name: Build and push Table Order
        uses: docker/build-push-action@v5
        with:
          context: ./table-order
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-table-order:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-table-order:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-table-order:production
          cache-from: type=gha,scope=table-order-production
          cache-to: type=gha,mode=max,scope=table-order-production
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.release.outputs.new_version }}

      # ============================================
      # Backend Microservices
      # ============================================

      - name: Build and push Core Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/core/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-core:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-core:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-core:production
          cache-from: type=gha,scope=core-production
          cache-to: type=gha,mode=max,scope=core-production

      - name: Build and push Orders Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/orders/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-orders:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-orders:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-orders:production
          cache-from: type=gha,scope=orders-production
          cache-to: type=gha,mode=max,scope=orders-production

      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/ai/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-ai:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-ai:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-ai:production
          cache-from: type=gha,scope=ai-production
          cache-to: type=gha,mode=max,scope=ai-production

      - name: Build and push Notifications Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/notifications/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-notifications:${{ needs.release.outputs.release_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-notifications:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-notifications:production
          cache-from: type=gha,scope=notifications-production
          cache-to: type=gha,mode=max,scope=notifications-production

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [release, build-and-tag]
    if: github.event.inputs.deploy_to_production == 'true'
    environment:
      name: production
      url: https://gpilot.app
    steps:
      # Docker images are tagged :latest by the build-and-tag job above.
      # Watchtower on the production server polls for new :latest images and restarts automatically.

      - name: Notify Slack about Release
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \":rocket: GastroPilot Release ${{ needs.release.outputs.release_tag }}\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Version:* ${{ needs.release.outputs.new_version }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Environment:* Production\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Released by:* ${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"<${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.release.outputs.release_tag }}|View Release>\"
                    }
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

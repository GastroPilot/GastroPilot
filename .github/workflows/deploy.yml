name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - demo
      ref:
        description: 'Branch or tag to deploy (e.g. main, v0.13.0)'
        required: true
        type: string
        default: 'main'
      version:
        description: 'App version (used as NEXT_PUBLIC_APP_VERSION)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  DOCKERHUB_ORG: servecta

jobs:
  build-and-deploy:
    name: Build & Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.ref }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set environment variables
        id: vars
        env:
          INPUT_ENV: ${{ github.event.inputs.environment }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "tag=$INPUT_ENV" >> $GITHUB_OUTPUT
          echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT

      # ============================================
      # Frontend Apps (with NEXT_PUBLIC_APP_VERSION)
      # ============================================

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-web:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-web:sha-${{ github.sha }}
          cache-from: type=gha,scope=frontend-${{ steps.vars.outputs.tag }}
          cache-to: type=gha,mode=max,scope=frontend-${{ steps.vars.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.vars.outputs.version }}

      - name: Build and push Guest Portal
        uses: docker/build-push-action@v5
        with:
          context: ./guest-portal
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-guest-portal:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-guest-portal:sha-${{ github.sha }}
          cache-from: type=gha,scope=guest-portal-${{ steps.vars.outputs.tag }}
          cache-to: type=gha,mode=max,scope=guest-portal-${{ steps.vars.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.vars.outputs.version }}

      - name: Build and push KDS
        uses: docker/build-push-action@v5
        with:
          context: ./kds
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-kds:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-kds:sha-${{ github.sha }}
          cache-from: type=gha,scope=kds-${{ steps.vars.outputs.tag }}
          cache-to: type=gha,mode=max,scope=kds-${{ steps.vars.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.vars.outputs.version }}

      - name: Build and push Table Order
        uses: docker/build-push-action@v5
        with:
          context: ./table-order
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-table-order:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-table-order:sha-${{ github.sha }}
          cache-from: type=gha,scope=table-order-${{ steps.vars.outputs.tag }}
          cache-to: type=gha,mode=max,scope=table-order-${{ steps.vars.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.vars.outputs.version }}

      # ============================================
      # Backend Microservices
      # ============================================

      - name: Build and push Core Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/core/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-core:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-core:sha-${{ github.sha }}
          cache-from: type=gha,scope=core-${{ steps.vars.outputs.tag }}
          cache-to: type=gha,mode=max,scope=core-${{ steps.vars.outputs.tag }}

      - name: Build and push Orders Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/orders/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-orders:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-orders:sha-${{ github.sha }}
          cache-from: type=gha,scope=orders-${{ steps.vars.outputs.tag }}
          cache-to: type=gha,mode=max,scope=orders-${{ steps.vars.outputs.tag }}

      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/ai/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-ai:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-ai:sha-${{ github.sha }}
          cache-from: type=gha,scope=ai-${{ steps.vars.outputs.tag }}
          cache-to: type=gha,mode=max,scope=ai-${{ steps.vars.outputs.tag }}

      - name: Build and push Notifications Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/notifications/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-notifications:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-notifications:sha-${{ github.sha }}
          cache-from: type=gha,scope=notifications-${{ steps.vars.outputs.tag }}
          cache-to: type=gha,mode=max,scope=notifications-${{ steps.vars.outputs.tag }}

      # ============================================
      # Notification
      # ============================================

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          DEPLOY_VERSION: ${{ github.event.inputs.version }}
          DEPLOY_REF: ${{ github.event.inputs.ref }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          if [ "$JOB_STATUS" == "success" ]; then
            EMOJI=":white_check_mark:"
            STATUS="successful"
          else
            EMOJI=":x:"
            STATUS="failed"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"${EMOJI} GastroPilot Deploy ${STATUS}\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Environment:* ${DEPLOY_ENV}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Version:* ${DEPLOY_VERSION}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Ref:* ${DEPLOY_REF}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Actor:* ${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>\"
                    }
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

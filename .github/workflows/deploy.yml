name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ziel-Environment (Test, Staging oder Demo)'
        required: true
        type: choice
        options:
          - test
          - staging
          - demo
      ref:
        description: 'Code-Stand der gebaut wird (Branch oder Tag, z.B. "main" oder "v0.14.0"). NICHT das Environment!'
        required: true
        type: string
        default: 'main'
      version:
        description: 'Versions-String fuer die App (wird als NEXT_PUBLIC_APP_VERSION in die Frontends eingebaut)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  # ============================================
  # Checkout & Setup (einmalig, shared via artifacts)
  # ============================================
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    outputs:
      tag: ${{ github.event.inputs.environment }}
      version: ${{ github.event.inputs.version }}
    steps:
      - name: Summary
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          DEPLOY_REF: ${{ github.event.inputs.ref }}
          DEPLOY_VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "## Deploy Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $DEPLOY_ENV |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref (Code-Stand) | $DEPLOY_REF |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | $DEPLOY_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | :$DEPLOY_ENV |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Parallele Builds — Frontend Apps
  # ============================================
  build-frontend:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            image: gastropilot-web
            context: ./web
          - app: dashboard
            image: gastropilot-dashboard
            context: ./dashboard
          - app: kds
            image: gastropilot-kds
            context: ./kds
          - app: table-order
            image: gastropilot-table-order
            context: ./table-order
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.ref }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.prepare.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}-${{ needs.prepare.outputs.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-${{ needs.prepare.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.prepare.outputs.version }}

  # ============================================
  # Parallele Builds — Backend Microservices
  # ============================================
  build-backend:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: core
            image: gastropilot-core
            dockerfile: services/core/Dockerfile
          - service: orders
            image: gastropilot-orders
            dockerfile: services/orders/Dockerfile
          - service: ai
            image: gastropilot-ai
            dockerfile: services/ai/Dockerfile
          - service: notifications
            image: gastropilot-notifications
            dockerfile: services/notifications/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.ref }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.prepare.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}-${{ needs.prepare.outputs.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ needs.prepare.outputs.tag }}

  # ============================================
  # Notification (nach allen Builds)
  # ============================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [prepare, build-frontend, build-backend]
    if: always()
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          DEPLOY_VERSION: ${{ github.event.inputs.version }}
          DEPLOY_REF: ${{ github.event.inputs.ref }}
          FRONTEND_STATUS: ${{ needs.build-frontend.result }}
          BACKEND_STATUS: ${{ needs.build-backend.result }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping"
            exit 0
          fi

          if [ "$FRONTEND_STATUS" == "success" ] && [ "$BACKEND_STATUS" == "success" ]; then
            EMOJI=":white_check_mark:"
            STATUS="successful"
          else
            EMOJI=":x:"
            STATUS="failed (frontend=$FRONTEND_STATUS, backend=$BACKEND_STATUS)"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"${EMOJI} GastroPilot Deploy ${STATUS}\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Environment:* ${DEPLOY_ENV}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Version:* ${DEPLOY_VERSION}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Ref:* ${DEPLOY_REF}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Actor:* ${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>\"
                    }
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ziel-Environment'
        required: true
        type: choice
        options:
          - test
          - staging
          - demo
          - all
      ref:
        description: 'Code-Stand (Branch oder Tag, z.B. "main" oder "v0.14.0")'
        required: true
        type: string
        default: 'main'
      version:
        description: 'Versions-String (leer = auto-generiert via version.sh)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  # ============================================
  # Matrix vorbereiten: einzelnes oder alle Environments
  # ============================================
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set-envs.outputs.environments }}
    steps:
      - name: Environments bestimmen
        id: set-envs
        env:
          INPUT_ENV: ${{ github.event.inputs.environment }}
        run: |
          if [ "$INPUT_ENV" = "all" ]; then
            echo 'environments=["test","staging","demo"]' >> "$GITHUB_OUTPUT"
          else
            echo "environments=[\"$INPUT_ENV\"]" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        env:
          INPUT_ENV: ${{ github.event.inputs.environment }}
          INPUT_REF: ${{ github.event.inputs.ref }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "## Deploy Configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environments | $INPUT_ENV |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref | $INPUT_REF |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${INPUT_VERSION:-auto} |" >> "$GITHUB_STEP_SUMMARY"

  # ============================================
  # Deploy pro Environment (parallel bei "all")
  # ============================================
  deploy:
    name: Deploy ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.prepare.outputs.environments) }}
    concurrency:
      group: deploy-${{ matrix.env }}
      cancel-in-progress: false
    environment:
      name: ${{ matrix.env }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.ref }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Version bestimmen
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          DEPLOY_ENV: ${{ matrix.env }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            chmod +x scripts/version.sh
            VERSION=$(scripts/version.sh web "$DEPLOY_ENV")
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        env:
          DEPLOY_ENV: ${{ matrix.env }}
          RESOLVED_VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "### $DEPLOY_ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** $RESOLVED_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image Tag:** :$DEPLOY_ENV" >> "$GITHUB_STEP_SUMMARY"

  # ============================================
  # Parallele Builds — Frontend Apps (pro Environment)
  # ============================================
  build-frontend:
    name: "[${{ matrix.env }}] Build ${{ matrix.app }}"
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.prepare.outputs.environments) }}
        app: [web, dashboard, kds, table-order]
        include:
          - app: web
            image: gastropilot-web
            context: ./web
          - app: dashboard
            image: gastropilot-dashboard
            context: ./dashboard
          - app: kds
            image: gastropilot-kds
            context: ./kds
          - app: table-order
            image: gastropilot-table-order
            context: ./table-order
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.ref }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Version bestimmen
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          DEPLOY_ENV: ${{ matrix.env }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            chmod +x scripts/version.sh
            echo "version=$(scripts/version.sh "${{ matrix.app }}" "$DEPLOY_ENV")" >> "$GITHUB_OUTPUT"
          fi
          echo "build_date=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ matrix.env }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}-${{ matrix.env }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-${{ matrix.env }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.version.outputs.version }}
            NEXT_PUBLIC_BUILD_DATE=${{ steps.version.outputs.build_date }}

  # ============================================
  # Parallele Builds — Backend Microservices (pro Environment)
  # ============================================
  build-backend:
    name: "[${{ matrix.env }}] Build ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.prepare.outputs.environments) }}
        service: [core, orders, ai, notifications]
        include:
          - service: core
            image: gastropilot-core
            dockerfile: services/core/Dockerfile
          - service: orders
            image: gastropilot-orders
            dockerfile: services/orders/Dockerfile
          - service: ai
            image: gastropilot-ai
            dockerfile: services/ai/Dockerfile
          - service: notifications
            image: gastropilot-notifications
            dockerfile: services/notifications/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.ref }}
          token: ${{ secrets.SUBMODULE_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ matrix.env }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.env }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ matrix.env }}

  # ============================================
  # Notification (nach allen Builds)
  # ============================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [prepare, build-frontend, build-backend]
    if: always()
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          DEPLOY_VERSION: ${{ github.event.inputs.version }}
          DEPLOY_REF: ${{ github.event.inputs.ref }}
          FRONTEND_STATUS: ${{ needs.build-frontend.result }}
          BACKEND_STATUS: ${{ needs.build-backend.result }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping"
            exit 0
          fi

          if [ "$FRONTEND_STATUS" == "success" ] && [ "$BACKEND_STATUS" == "success" ]; then
            EMOJI=":white_check_mark:"
            STATUS="successful"
          else
            EMOJI=":x:"
            STATUS="failed (frontend=$FRONTEND_STATUS, backend=$BACKEND_STATUS)"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"${EMOJI} GastroPilot Deploy ${STATUS}\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Environment:* ${DEPLOY_ENV}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Version:* ${DEPLOY_VERSION:-auto}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Ref:* ${DEPLOY_REF}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Actor:* ${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>\"
                    }
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

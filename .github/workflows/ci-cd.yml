name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - test
          - staging
          - demo
          - production
      # build_ios:
      #   description: 'Build iOS App?'
      #   required: false
      #   type: boolean
      #   default: false

env:
  DOCKERHUB_ORG: servecta
  NODE_VERSION: '20'

jobs:

  # ============================================
  # Build & Push Docker Images - Test (Dispatch)
  # ============================================

  build-test-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Get version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0-dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_ORG }}/gastropilot-frontend
          tags: |
            type=raw,value=test
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=test-

      - name: Build and push Frontend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./gastropilot-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.version.outputs.version }}

  build-test-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Get version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0-dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
          # Copy VERSION to backend directory for Docker build
          cp VERSION ./gastropilot-backend/VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_ORG }}/gastropilot-backend
          tags: |
            type=raw,value=test
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=test-

      - name: Build and push Backend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./gastropilot-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  # ============================================
  # Build & Push Docker Images - Staging (push/PR to main)
  # ============================================

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Get version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0-dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_ORG }}/gastropilot-frontend
          tags: |
            type=raw,value=staging
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=staging-

      - name: Build and push Frontend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./gastropilot-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.version.outputs.version }}

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Get version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0-dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
          # Copy VERSION to backend directory for Docker build
          cp VERSION ./gastropilot-backend/VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_ORG }}/gastropilot-backend
          tags: |
            type=raw,value=staging
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=staging-

      - name: Build and push Backend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./gastropilot-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-app:
    name: Build App (Expo Web)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Get version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0-dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './gastropilot-app/package-lock.json'

      - name: Install dependencies
        working-directory: ./gastropilot-app
        run: npm ci

      - name: Run Lint
        working-directory: ./gastropilot-app
        run: npm run lint

      - name: Run TypeScript check
        working-directory: ./gastropilot-app
        run: npx tsc --noEmit

      - name: Build Expo Web for Staging
        working-directory: ./gastropilot-app
        env:
          EXPO_PUBLIC_API_URL: https://api-staging.gpilot.app/v1
          EXPO_PUBLIC_MOTHERSHIP_URL: https://mothership.gastropilot.org/test/v1
        run: npx expo export --platform web --output-dir dist

      - name: Create deployment package
        working-directory: ./gastropilot-app
        run: |
          tar -czf ../expo-web-staging.tar.gz -C dist .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: expo-web-build
          path: expo-web-staging.tar.gz
          retention-days: 1

  # ============================================
  # iOS Build - Deaktiviert (Apple Developer License erforderlich)
  # ============================================
  # build-ios:
  #   name: Build iOS App (EAS)
  #   runs-on: ubuntu-latest
  #   if: |
  #     (github.event_name == 'workflow_dispatch' && github.event.inputs.build_ios == 'true') ||
  #     (github.event_name == 'push' && github.ref == 'refs/heads/main')
  #   steps:
  #     - name: Checkout code with submodules
  #       uses: actions/checkout@v4
  #       with:
  #         submodules: recursive
  #         fetch-depth: 0
  #         token: ${{ secrets.SUBMODULE_PAT }}
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.NODE_VERSION }}
  #         cache: 'npm'
  #         cache-dependency-path: './gastropilot-app/package-lock.json'
  #
  #     - name: Install dependencies
  #       working-directory: ./gastropilot-app
  #       run: npm ci
  #
  #     - name: Setup Expo CLI
  #       uses: expo/expo-github-action@v8
  #       with:
  #         eas-version: latest
  #         token: ${{ secrets.EXPO_TOKEN }}
  #
  #     - name: Build iOS App with EAS
  #       working-directory: ./gastropilot-app
  #       run: |
  #         eas build --platform ios --profile staging --non-interactive
  #       env:
  #         EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ============================================
  # Deploy to Staging (push/PR to main)
  # ============================================

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, build-app]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    environment:
      name: staging
      url: https://staging.gpilot.app, https://api-staging.gpilot.app, https://app-staging.gpilot.app
    steps:
      # Docker images are tagged :staging by the build jobs above.
      # Watchtower on the staging server automatically polls for new :staging images
      # and restarts containers — no SSH deploy needed.

      - name: Download App build artifacts
        uses: actions/download-artifact@v4
        with:
          name: expo-web-build
          path: ./

      - name: Deploy App to Staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "expo-web-staging.tar.gz"
          target: "/tmp/"

      - name: Extract and deploy App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_PATH="/opt/gastropilot/staging/expo-web"

            echo "=== Deploying Expo Web App to Staging ==="

            NEW_DIR="${DEPLOY_PATH}_new"
            BACKUP_DIR="${DEPLOY_PATH}_backup_$(date +%s)"

            rm -rf "$NEW_DIR"
            mkdir -p "$NEW_DIR"

            echo "Extracting web build..."
            tar -xzf /tmp/expo-web-staging.tar.gz -C "$NEW_DIR"
            rm -f /tmp/expo-web-staging.tar.gz

            if [ -d "$DEPLOY_PATH" ]; then
              mv "$DEPLOY_PATH" "$BACKUP_DIR" || true
              echo "Backup created at $BACKUP_DIR"
            fi

            mv "$NEW_DIR" "$DEPLOY_PATH"

            # Cleanup old backups (keep last 3)
            ls -dt ${DEPLOY_PATH}_backup_* 2>/dev/null | tail -n +4 | xargs rm -rf || true

            echo "=== Expo Web App staging deployment successful! ==="

  # ============================================
  # Deploy to Demo (workflow_dispatch)
  # ============================================

  deploy-demo:
    name: Deploy to Demo
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'demo'
    environment:
      name: demo
      url: https://demo.gpilot.app, https://api-demo.gpilot.app, https://app-demo.gpilot.app
    steps:
      # Promote staging images to :demo tag on Docker Hub.
      # Watchtower on the demo server polls for new :demo images and restarts automatically.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote staging images to demo
        run: |
          echo "=== Promoting staging images to demo ==="

          # Pull staging images
          docker pull ${{ env.DOCKERHUB_ORG }}/gastropilot-frontend:staging
          docker pull ${{ env.DOCKERHUB_ORG }}/gastropilot-backend:staging

          # Tag as demo
          docker tag ${{ env.DOCKERHUB_ORG }}/gastropilot-frontend:staging ${{ env.DOCKERHUB_ORG }}/gastropilot-frontend:demo
          docker tag ${{ env.DOCKERHUB_ORG }}/gastropilot-backend:staging ${{ env.DOCKERHUB_ORG }}/gastropilot-backend:demo

          # Push demo tags — Watchtower on demo server will pick these up
          docker push ${{ env.DOCKERHUB_ORG }}/gastropilot-frontend:demo
          docker push ${{ env.DOCKERHUB_ORG }}/gastropilot-backend:demo

          echo "=== Demo images pushed. Watchtower will deploy automatically. ==="

      - name: Promote Expo Web App to Demo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== Promoting Expo Web App to Demo ==="
            STAGING_PATH="/opt/gastropilot/staging/expo-web"
            DEMO_PATH="/opt/gastropilot/demo/expo-web"

            if [ -d "$STAGING_PATH" ]; then
              BACKUP_DIR="${DEMO_PATH}_backup_$(date +%s)"

              if [ -d "$DEMO_PATH" ]; then
                mv "$DEMO_PATH" "$BACKUP_DIR" || true
              fi

              cp -r "$STAGING_PATH" "$DEMO_PATH"

              # Cleanup old backups
              ls -dt ${DEMO_PATH}_backup_* 2>/dev/null | tail -n +4 | xargs rm -rf || true

              echo "Expo Web App promoted to demo!"
            else
              echo "Warning: Staging Expo Web not found, skipping app promotion"
            fi

            echo "=== Demo Expo Web deployment successful! ==="

  # ============================================
  # Deploy to Production (workflow_dispatch)
  # ============================================

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://gpilot.app, https://api.gpilot.app
    steps:
      # Promote staging images to :latest tag on Docker Hub.
      # Watchtower on the production server polls for new :latest images and restarts automatically.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote staging images to production
        run: |
          echo "=== Promoting staging images to production ==="

          # Pull staging images
          docker pull ${{ env.DOCKERHUB_ORG }}/gastropilot-frontend:staging
          docker pull ${{ env.DOCKERHUB_ORG }}/gastropilot-backend:staging

          # Tag as latest (production)
          docker tag ${{ env.DOCKERHUB_ORG }}/gastropilot-frontend:staging ${{ env.DOCKERHUB_ORG }}/gastropilot-frontend:latest
          docker tag ${{ env.DOCKERHUB_ORG }}/gastropilot-backend:staging ${{ env.DOCKERHUB_ORG }}/gastropilot-backend:latest

          # Push latest tags — Watchtower on production server will pick these up
          docker push ${{ env.DOCKERHUB_ORG }}/gastropilot-frontend:latest
          docker push ${{ env.DOCKERHUB_ORG }}/gastropilot-backend:latest

          echo "=== Production images pushed. Watchtower will deploy automatically. ==="

      - name: Promote Expo Web App to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== Promoting Expo Web App to Production ==="
            STAGING_PATH="/opt/gastropilot/staging/expo-web"
            PROD_PATH="/opt/gastropilot/production/expo-web"

            if [ -d "$STAGING_PATH" ]; then
              BACKUP_DIR="${PROD_PATH}_backup_$(date +%s)"

              if [ -d "$PROD_PATH" ]; then
                mv "$PROD_PATH" "$BACKUP_DIR" || true
              fi

              cp -r "$STAGING_PATH" "$PROD_PATH"

              # Cleanup old backups
              ls -dt ${PROD_PATH}_backup_* 2>/dev/null | tail -n +4 | xargs rm -rf || true

              echo "Expo Web App promoted to production!"
            else
              echo "Warning: Staging Expo Web not found, skipping app promotion"
            fi

            echo "=== Production Expo Web deployment successful! ==="

  # ============================================
  # Notifications
  # ============================================

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, build-app, deploy-staging]
    if: always() && (github.event_name == 'push' || github.event_name == 'pull_request')
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.build-frontend.result }}" == "success" ] && \
             [ "${{ needs.build-backend.result }}" == "success" ] && \
             [ "${{ needs.build-app.result }}" == "success" ] && \
             [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=:white_check_mark:" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=:x:" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          STATUS="${{ steps.status.outputs.status }}"
          EMOJI="${{ steps.status.outputs.emoji }}"
          VERSION="${{ needs.build-frontend.outputs.version }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/"/\\"/g')
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"${EMOJI} GastroPilot Deployment v${VERSION}\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Status:* ${STATUS}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Version:* v${VERSION}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Environment:* Staging\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Commit:* ${COMMIT_SHORT}\"}
                  ]
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Message:* ${COMMIT_MSG}\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>\"
                    }
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

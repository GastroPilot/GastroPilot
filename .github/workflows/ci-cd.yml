name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy-Ziel'
        required: true
        type: choice
        options:
          - staging

env:
  NODE_VERSION: '20'

jobs:

  # ============================================
  # Determine tag: latest (push to main) or staging (workflow_dispatch)
  # ============================================

  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Set image tag
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # Build & Push Frontend
  # ============================================

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Get version
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0-dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-web
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=sha,prefix=${{ needs.prepare.outputs.tag }}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./gastropilot-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.version.outputs.version }}

  # ============================================
  # Build & Push Backend
  # ============================================

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Get version
        id: version
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0-dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          cp VERSION ./gastropilot-backend/VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gastropilot-backend
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=sha,prefix=${{ needs.prepare.outputs.tag }}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./gastropilot-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - demo
          - production

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # Build & Push Docker Images
  # ============================================

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/gastropilot/gastropilot-frontend
          tags: |
            type=raw,value=main
            type=sha,prefix=main-

      - name: Build and push Frontend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./gastropilot-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ github.sha }}

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/gastropilot/gastropilot-backend
          tags: |
            type=raw,value=main
            type=sha,prefix=main-

      - name: Build and push Backend
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./gastropilot-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Deployments
  # ============================================

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.gpilot.app
    steps:
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== Deploying to Staging Environment ==="

            cd /opt/gastropilot/staging

            # Login to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u duhrkah --password-stdin

            # Pull latest images
            echo "Pulling latest images..."
            docker compose pull frontend backend

            # Restart services
            echo "Restarting services..."
            docker compose up -d frontend backend

            # Wait for services to start
            echo "Waiting for services to start..."
            sleep 15

            # Health checks
            echo "Running health checks..."

            # Backend health check
            for i in {1..10}; do
              if curl -f -s http://localhost:8003/v1/health > /dev/null 2>&1; then
                echo "Backend health check passed!"
                break
              fi
              echo "Backend attempt $i/10 - waiting..."
              sleep 3
              if [ $i -eq 10 ]; then
                echo "Backend health check failed!"
                docker compose logs --tail=30 backend
                exit 1
              fi
            done

            # Frontend health check
            for i in {1..10}; do
              if curl -f -s http://localhost:3003 > /dev/null 2>&1; then
                echo "Frontend health check passed!"
                break
              fi
              echo "Frontend attempt $i/10 - waiting..."
              sleep 3
              if [ $i -eq 10 ]; then
                echo "Frontend health check failed!"
                docker compose logs --tail=30 frontend
                exit 1
              fi
            done

            echo "=== Staging deployment successful! ==="

  deploy-demo:
    name: Deploy to Demo
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'demo'
    environment:
      name: demo
      url: https://demo.gpilot.app
    steps:
      - name: Deploy to Demo Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== Deploying to Demo Environment ==="

            cd /opt/gastropilot/demo

            # Login to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u duhrkah --password-stdin

            # Pull latest images
            echo "Pulling latest images..."
            docker compose pull frontend backend

            # Restart services
            echo "Restarting services..."
            docker compose up -d frontend backend

            # Wait for services to start
            echo "Waiting for services to start..."
            sleep 15

            # Health checks
            echo "Running health checks..."

            # Backend health check
            for i in {1..10}; do
              if curl -f -s http://localhost:8002/v1/health > /dev/null 2>&1; then
                echo "Backend health check passed!"
                break
              fi
              echo "Backend attempt $i/10 - waiting..."
              sleep 3
              if [ $i -eq 10 ]; then
                echo "Backend health check failed!"
                docker compose logs --tail=30 backend
                exit 1
              fi
            done

            # Frontend health check
            for i in {1..10}; do
              if curl -f -s http://localhost:3002 > /dev/null 2>&1; then
                echo "Frontend health check passed!"
                break
              fi
              echo "Frontend attempt $i/10 - waiting..."
              sleep 3
              if [ $i -eq 10 ]; then
                echo "Frontend health check failed!"
                docker compose logs --tail=30 frontend
                exit 1
              fi
            done

            echo "=== Demo deployment successful! ==="

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://gpilot.app
    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== Deploying to Production Environment ==="

            cd /opt/gastropilot/production

            # Login to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u duhrkah --password-stdin

            # Pull latest images
            echo "Pulling latest images..."
            docker compose pull frontend backend

            # Restart services
            echo "Restarting services..."
            docker compose up -d frontend backend

            # Wait for services to start
            echo "Waiting for services to start..."
            sleep 15

            # Health checks
            echo "Running health checks..."

            # Backend health check
            for i in {1..10}; do
              if curl -f -s http://localhost:8000/v1/health > /dev/null 2>&1; then
                echo "Backend health check passed!"
                break
              fi
              echo "Backend attempt $i/10 - waiting..."
              sleep 3
              if [ $i -eq 10 ]; then
                echo "Backend health check failed!"
                docker compose logs --tail=30 backend
                exit 1
              fi
            done

            # Frontend health check
            for i in {1..10}; do
              if curl -f -s http://localhost:3000 > /dev/null 2>&1; then
                echo "Frontend health check passed!"
                break
              fi
              echo "Frontend attempt $i/10 - waiting..."
              sleep 3
              if [ $i -eq 10 ]; then
                echo "Frontend health check failed!"
                docker compose logs --tail=30 frontend
                exit 1
              fi
            done

            echo "=== Production deployment successful! ==="

  # ============================================
  # Notifications
  # ============================================

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, deploy-staging]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.build-frontend.result }}" == "success" ] && \
             [ "${{ needs.build-backend.result }}" == "success" ] && \
             [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=:white_check_mark:" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=:x:" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          STATUS="${{ steps.status.outputs.status }}"
          EMOJI="${{ steps.status.outputs.emoji }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/"/\\"/g')
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"${EMOJI} GastroPilot Deployment\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Status:* ${STATUS}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Environment:* Staging\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Commit:* ${COMMIT_SHORT}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Actor:* ${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Message:* ${COMMIT_MSG}\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>\"
                    }
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

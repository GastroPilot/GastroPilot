server {
    listen 80;
    server_name _;

    # Security-Header
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS – immer setzen, auch bei Fehlern (503, 429 etc.)
    set $cors_origin "";
    if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$") {
        set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin  $cors_origin always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-Id" always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ---------------------------------------------------------------------------
    # WebSocket – Order Service
    # ---------------------------------------------------------------------------
    location /ws/ {
        limit_req zone=ip_limit burst=20 nodelay;

        proxy_pass http://orders;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
    }

    # ---------------------------------------------------------------------------
    # AI Service – /ai/ und /api/v1/ai/ und /v1/ai/
    # ---------------------------------------------------------------------------
    location ~ ^/(api/v1|v1)/ai/ {
        limit_req zone=ip_limit burst=30 nodelay;
        limit_req zone=tenant_limit burst=60 nodelay;

        proxy_pass http://ai;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
    }

    # ---------------------------------------------------------------------------
    # Notifications Service – /api/v1/notifications/ und /v1/notifications/
    # ---------------------------------------------------------------------------
    location ~ ^/(api/v1|v1)/notifications/ {
        limit_req zone=ip_limit burst=20 nodelay;

        proxy_pass http://notifications;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
    }

    # ---------------------------------------------------------------------------
    # Order Service – /api/v1/orders/, /v1/orders/, /api/v1/kitchen/, /v1/kitchen/
    # ---------------------------------------------------------------------------
    location ~ ^/(api/v1|v1)/(orders|kitchen|waitlist|order-statistics|invoices|sumup)/ {
        limit_req zone=ip_limit burst=60 nodelay;
        limit_req zone=tenant_limit burst=300 nodelay;

        proxy_pass http://orders;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
    }

    # ---------------------------------------------------------------------------
    # Auth – /me kein Rate-Limit (wird bei jedem Seitenaufruf aufgerufen)
    # ---------------------------------------------------------------------------
    location ~ ^/(api/v1|v1)/auth/me {
        proxy_pass http://core;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
    }

    # Auth – Login/Refresh mit Rate-Limit gegen Brute-Force
    location ~ ^/(api/v1|v1)/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;

        proxy_pass http://core;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
    }

    # ---------------------------------------------------------------------------
    # Webhooks – SumUp → Orders Service
    # ---------------------------------------------------------------------------
    location ~ ^/(api/v1|v1)/webhooks/sumup {
        proxy_pass http://orders;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
    }

    # ---------------------------------------------------------------------------
    # Webhooks – WhatsApp → Notifications Service
    # ---------------------------------------------------------------------------
    location ~ ^/(api/v1|v1)/webhooks/whatsapp {
        proxy_pass http://notifications;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
    }

    # ---------------------------------------------------------------------------
    # Core Service – alles andere
    # ---------------------------------------------------------------------------
    location ~ ^/(api/v1|v1)/ {
        limit_req zone=ip_limit burst=120 nodelay;
        limit_req zone=tenant_limit burst=600 nodelay;

        proxy_pass http://core;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
    }

    # ---------------------------------------------------------------------------
    # Health-Checks (kein Rate-Limit)
    # ---------------------------------------------------------------------------
    location /health {
        proxy_pass http://core/api/v1/health;
        access_log off;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
    }

    # ---------------------------------------------------------------------------
    # Frontend – Next.js HMR WebSocket (Turbopack Dev-Mode)
    # ---------------------------------------------------------------------------
    location /_next/webpack-hmr {
        proxy_pass http://frontend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ---------------------------------------------------------------------------
    # Frontend – Next.js statische Assets + HMR
    # ---------------------------------------------------------------------------
    location /_next/ {
        proxy_pass http://frontend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---------------------------------------------------------------------------
    # Frontend – alle anderen Routen (SPA-Fallback)
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass http://frontend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

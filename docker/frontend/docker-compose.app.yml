# GastroPilot — Frontend-Server (app.servecta.local)
# Frontend + nginx. nginx proxied /v1 an api.servecta.local.
#
# Images: Docker Hub (servecta/gastropilot-frontend)
# Verwendung:
#   docker compose -f docker-compose.app.yml --env-file .env.app up -d
#
# Voraussetzung: .env.app aus .env.app.example anlegen
#               api.servecta.local muss erreichbar sein (Backend)

name: ${STACK_NAME:-gastropilot-app}

services:
  frontend:
    image: servecta/gastropilot-web:${IMAGE_TAG:-latest}
    container_name: ${STACK_NAME:-gastropilot-app}-frontend
    environment:
      NODE_ENV: production
      # API über nginx-Proxy (Same-Origin): /v1 wird an api.servecta.local weitergeleitet
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://app.servecta.local}
      BASE_URL: ${BASE_URL:-https://app.servecta.local}
      AUTH_SECRET: ${AUTH_SECRET}
      API_PREFIX: ${API_PREFIX:-/v1}
      NEXT_TELEMETRY_DISABLED: 1
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gastropilot-app

  # nginx Reverse Proxy (proxied /v1 an api.servecta.local)
  nginx:
    image: nginx:alpine
    container_name: ${STACK_NAME:-gastropilot-app}-nginx
    volumes:
      - ./nginx.app.conf:/etc/nginx/nginx.conf:ro
      - ./pages:/usr/share/nginx/html:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - gastropilot-app
      - gastropilot-proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nginx-cache:
    driver: local

networks:
  gastropilot-app:
    driver: bridge
  gastropilot-proxy:
    external: true

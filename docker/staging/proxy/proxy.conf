# Gemeinsamer nginx-Proxy — Haupt-Config
# SSL-Terminierung, virtuelle Hosts aus conf.d/*.conf

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # WebSocket / SSE Upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Health-Check fuer Docker (Port 80)
    server {
        listen 80 default_server;
        server_name _;
        location /health {
            access_log off;
            default_type text/plain;
            return 200 'ok';
        }
        location / {
            return 404;
        }
    }

    # Virtuelle Hosts (SSL) — nur *.conf in conf.d/ werden geladen (keine .example, kein Unterordner)
    include /etc/nginx/conf.d/*.conf;
}

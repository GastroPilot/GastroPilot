# Gemeinsamer nginx-Proxy fuer GastroPilot
# Terminiert SSL und routet per Domain.
#
# Single-Server: Routet an Stack-nginx (gastropilot-nginx)
# Verteilt: Routet stage.servecta.local -> frontend:80, stage-api.servecta.local -> backend:8000
#
# Verwendung:
#   docker compose -f docker-compose.proxy.yml up -d

name: gastropilot-staging-proxy

services:
  nginx:
    image: nginx:alpine
    container_name: gastropilot-staging-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - gastropilot-staging-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  gastropilot-staging-proxy:
    name: gastropilot-staging-proxy
    driver: bridge

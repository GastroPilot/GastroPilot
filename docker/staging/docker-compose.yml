# GastroPilot — Staging-Server (Single-Server Setup)
# Frontend: stage.gpilot.org
# Backend: stage-api.gpilot.app
#
# Images: Docker Hub (servecta/gastropilot-frontend)
# Verwendung:
#   docker compose -f docker-compose.yml --env-file .env up -d
#
# Voraussetzung: .env aus .env.example anlegen

name: ${STACK_NAME:-gastropilot-staging}

services:
  frontend:
    image: servecta/gastropilot-web:${IMAGE_TAG:-staging}
    container_name: ${STACK_NAME:-gastropilot-staging}-frontend
    environment:
      NODE_ENV: production
      # API über nginx-Proxy (Same-Origin): /v1 wird an Backend weitergeleitet
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://stage-api.gpilot.app}
      BASE_URL: ${BASE_URL:-https://stage.gpilot.org}
      AUTH_SECRET: ${AUTH_SECRET}
      API_PREFIX: ${API_PREFIX:-/v1}
      NEXT_TELEMETRY_DISABLED: 1
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gastropilot-staging

  # nginx Reverse Proxy (Frontend + Backend auf einem Server)
  nginx:
    image: nginx:alpine
    container_name: ${STACK_NAME:-gastropilot-staging}-nginx
    volumes:
      - ./nginx.app.conf:/etc/nginx/nginx.conf:ro
      - ./pages:/usr/share/nginx/html:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      gastropilot-staging:
      gastropilot-staging-proxy:
        aliases:
          - stage.servecta.local
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: servecta/gastropilot-backend:${IMAGE_TAG:-staging}
    container_name: ${STACK_NAME:-gastropilot-staging}-backend
    environment:
      ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-gastropilot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gastropilot_staging}?sslmode=disable}
      DATABASE_TYPE: ${DATABASE_TYPE:-neon}
      DATABASE_SSL_VERIFY: ${DATABASE_SSL_VERIFY:-false}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ISSUER: ${JWT_ISSUER:-gastropilot}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-gastropilot-api}
      JWT_LEEWAY_SECONDS: ${JWT_LEEWAY_SECONDS:-10}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS},stage-api.gpilot.app,localhost
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_MAX_ATTEMPTS: ${RATE_LIMIT_MAX_ATTEMPTS:-10}
      HEALTH_CHECK_ENABLED: ${HEALTH_CHECK_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      # E-Mail (SMTP)
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@gastropilot.de}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-GastroPilot}
      # Mothership (Lizenzverwaltung)
      MOTHERSHIP_API_URL: ${MOTHERSHIP_API_URL:-}
      MOTHERSHIP_API_KEY: ${MOTHERSHIP_API_KEY:-}
      # E-Mail-Tracking (Open/Click Tracking URLs)
      BASE_URL: ${BASE_URL:-https://stage.gpilot.org}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Twilio (SMS/Telefonie)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      # SumUp (Zahlungen)
      SUMUP_API_KEY: ${SUMUP_API_KEY:-}
      SUMUP_MERCHANT_CODE: ${SUMUP_MERCHANT_CODE:-}
      SUMUP_CALLBACK_URL: ${SUMUP_CALLBACK_URL:-}
      # Sentry (Error Tracking)
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "1"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      gastropilot-staging:
      gastropilot-staging-proxy:
        aliases:
          - stage-api.servecta.local

  postgres:
    image: postgres:16-alpine
    container_name: ${STACK_NAME:-gastropilot-staging}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gastropilot_staging}
      POSTGRES_USER: ${POSTGRES_USER:-gastropilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - gastropilot-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gastropilot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: ${STACK_NAME:-gastropilot-staging}-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - gastropilot-staging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

volumes:
  nginx-cache:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  gastropilot-staging:
    driver: bridge
  gastropilot-staging-proxy:
    external: true
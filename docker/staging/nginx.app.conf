# nginx fuer stage.gpilot.org (Microservices Setup)
# Routing:
#   /api/v1/ (default)                      -> core:8000
#   /api/v1/orders/, /api/v1/kitchen/,
#   /api/v1/order-statistics/, /api/v1/sumup/,
#   /api/v1/invoices/                        -> orders:8001
#   /api/v1/ai/                              -> ai:8002
#   /api/v1/webhooks/whatsapp               -> notifications:8003
#   /api/v1/webhooks/sumup                  -> orders:8001
#   /ws/                                     -> orders:8001 (WebSocket)
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Real-IP;

    # Upstream: Microservices
    upstream core {
        server core:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream orders {
        server orders:8001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ai {
        server ai:8002 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream notifications {
        server notifications:8003 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream frontend {
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Common proxy headers
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    server {
        listen 80;
        server_name _;

        # Maintenance mode
        set $maintenance "";
        if (-f /etc/nginx/maintenance.on) {
            set $maintenance "maintenance";
        }
        if (-f /etc/nginx/coming-soon.on) {
            set $maintenance "coming-soon";
        }

        error_page 503 @maintenance;
        location @maintenance {
            root /usr/share/nginx/html;
            try_files /$maintenance.html =503;
        }

        # --- Health checks (no maintenance gate) ---

        location /health {
            proxy_pass http://core/api/v1/health;
            access_log off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /v1/health {
            proxy_pass http://core/api/v1/health;
            access_log off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- WebSocket (Orders Service) ---

        location /ws/ {
            if ($maintenance) { return 503; }

            proxy_pass http://orders;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # --- Webhooks ---

        # SumUp webhooks -> Orders service
        location ~ ^/(api/v1|v1)/webhooks/sumup {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://orders;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # WhatsApp webhooks -> Notifications service
        location ~ ^/(api/v1|v1)/webhooks/whatsapp {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://notifications;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # --- Orders Service routes ---

        location ~ ^/(api/v1|v1)/(orders|kitchen|order-statistics|sumup|invoices|waitlist) {
            if ($maintenance) { return 503; }

            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://orders;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # --- AI Service routes ---

        location ~ ^/(api/v1|v1)/ai/ {
            if ($maintenance) { return 503; }

            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://ai;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # --- Core Service (default API routes) ---

        location ~ ^/(api/v1|v1)/ {
            if ($maintenance) { return 503; }

            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://core;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
        }

        # --- Email Tracking ---

        location /api/email/ {
            if ($maintenance) { return 503; }
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://core;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # --- Next.js API Route Handlers ---

        location /api/ {
            if ($maintenance) { return 503; }
            limit_req zone=web_limit burst=50 nodelay;
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # --- Static Assets ---

        location /_next/static/ {
            if ($maintenance) { return 503; }
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_cache_valid 200 365d;
            expires 365d;
            add_header Cache-Control "public, immutable";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            if ($maintenance) { return 503; }
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Frontend (Next.js catch-all) ---

        location / {
            if ($maintenance) { return 503; }
            limit_req zone=web_limit burst=50 nodelay;
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}

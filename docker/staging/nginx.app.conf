# nginx für stage.gpilot.org (verteiltes Setup)
# Frontend lokal, API-Proxy zu stage-api.gpilot.app
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

    # Echte Client-IP vom Proxy uebernehmen
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Real-IP;

    # Upstream Backend (lokal im gleichen Stack)
    upstream backend {
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Upstream Frontend (lokal)
    upstream frontend {
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # HTTP Server (kein SSL — SSL wird vom Proxy terminiert)
    server {
        listen 80;
        server_name _;

        # Wartungsmodus / Coming Soon — Flag-Dateien pruefen
        set $maintenance "";
        if (-f /etc/nginx/maintenance.on) {
            set $maintenance "maintenance";
        }
        if (-f /etc/nginx/coming-soon.on) {
            set $maintenance "coming-soon";
        }

        # Wartungsseiten (503 Error Handler)
        error_page 503 @maintenance;
        location @maintenance {
            root /usr/share/nginx/html;
            try_files /$maintenance.html =503;
        }

        # Health-Checks immer durchlassen (kein Wartungs-Check)
        location /health {
            proxy_pass http://backend/v1/health;
            access_log off;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /v1/health {
            proxy_pass http://backend/v1/health;
            access_log off;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API Proxy – Haupt-API (Backend auf stage-api.gpilot.app)
        location /v1/ {
            if ($maintenance) {
                return 503;
            }

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
        }

        # Email Tracking Routes (Backend /api/email/...)
        location /api/email/ {
            if ($maintenance) {
                return 503;
            }

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Connection "";
        }

        # Next.js API Route Handlers (/api/...)
        location /api/ {
            if ($maintenance) {
                return 503;
            }

            limit_req zone=web_limit burst=50 nodelay;

            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Next.js Static Assets (aggressive caching)
        location /_next/static/ {
            if ($maintenance) {
                return 503;
            }

            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_cache_valid 200 365d;
            expires 365d;
            add_header Cache-Control "public, immutable";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js Public Assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            if ($maintenance) {
                return 503;
            }

            proxy_pass http://frontend;
            proxy_http_version 1.1;

            expires 30d;
            add_header Cache-Control "public, max-age=2592000";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend (Next.js)
        location / {
            if ($maintenance) {
                return 503;
            }

            limit_req zone=web_limit burst=50 nodelay;

            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_cache_bypass $http_upgrade;
            add_header Cache-Control "no-cache, no-store, must-revalidate";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}

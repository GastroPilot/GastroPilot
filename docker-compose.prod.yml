# =============================================================================
# GastroPilot – Microservices Production Stack
# =============================================================================
# Startet alle Services ohne Dev-Features, mit Resource-Limits
#
# Starten:  docker compose -f docker-compose.prod.yml up -d
# Update:   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d --no-deps [service]
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastruktur
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: gp-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infra/sql/rls.sql:/docker-entrypoint-initdb.d/02_rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: gp-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Core Service
  # ---------------------------------------------------------------------------
  core:
    image: ${REGISTRY:-ghcr.io/gastropilot}/core:${VERSION:-latest}
    container_name: gp-core
    restart: always
    env_file: ./backend/services/core/.env.prod
    environment:
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Orders Service
  # ---------------------------------------------------------------------------
  orders:
    image: ${REGISTRY:-ghcr.io/gastropilot}/orders:${VERSION:-latest}
    container_name: gp-orders
    restart: always
    env_file: ./backend/services/orders/.env.prod
    environment:
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/orders/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # AI Service
  # ---------------------------------------------------------------------------
  ai:
    image: ${REGISTRY:-ghcr.io/gastropilot}/ai:${VERSION:-latest}
    container_name: gp-ai
    restart: always
    env_file: ./backend/services/ai/.env.prod
    environment:
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Notifications Service + Worker
  # ---------------------------------------------------------------------------
  notifications:
    image: ${REGISTRY:-ghcr.io/gastropilot}/notifications:${VERSION:-latest}
    container_name: gp-notifications
    restart: always
    env_file: ./backend/services/notifications/.env.prod
    environment:
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/v1/notifications/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  notifications-worker:
    image: ${REGISTRY:-ghcr.io/gastropilot}/notifications:${VERSION:-latest}
    container_name: gp-notifications-worker
    restart: always
    env_file: ./backend/services/notifications/.env.prod
    environment:
      ENVIRONMENT: production
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: gp-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - core
      - orders
      - ai
      - notifications
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - web
      - internal

networks:
  web:
    external: true
    name: web
  internal:
    driver: bridge
    name: gastropilot-prod-internal

volumes:
  postgres_data:
    name: gastropilot-postgres-prod
  redis_data:
    name: gastropilot-redis-prod
  nginx_logs:
    name: gastropilot-nginx-logs

# =============================================================================
# GastroPilot – Microservices Development Stack
# =============================================================================
# Startet alle 4 Services + nginx + postgres + redis mit Hot-Reload
#
# Voraussetzung: .env-Datei anlegen (siehe .env.example)
#
# Starten:    docker compose up -d
# Stoppen:    docker compose down
# Logs:       docker compose logs -f [service]
# Migration:  docker compose exec core alembic upgrade head
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastruktur
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: gp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gastropilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gastropilot}
      POSTGRES_DB: ${POSTGRES_DB:-gastropilot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infra/sql/rls.sql:/docker-entrypoint-initdb.d/02_rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gastropilot} -d ${POSTGRES_DB:-gastropilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: gp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Core Service (Auth, Restaurants, Reservierungen, Menü)
  # ---------------------------------------------------------------------------
  core:
    build:
      context: ./backend
      dockerfile: services/core/Dockerfile
    container_name: gp-core
    restart: unless-stopped
    env_file: ./backend/services/core/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gastropilot}:${POSTGRES_PASSWORD:-gastropilot}@postgres:5432/${POSTGRES_DB:-gastropilot}
      DATABASE_ADMIN_URL: postgresql+asyncpg://${POSTGRES_ADMIN_USER:-gastropilot_admin}:${POSTGRES_ADMIN_PASSWORD:-gastropilot_admin_password}@postgres:5432/${POSTGRES_DB:-gastropilot}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend/services/core/app:/app/app
      - ./backend/packages:/packages
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Orders Service (Bestellungen, Kitchen, WebSocket)
  # ---------------------------------------------------------------------------
  orders:
    build:
      context: ./backend
      dockerfile: services/orders/Dockerfile
    container_name: gp-orders
    restart: unless-stopped
    env_file: ./backend/services/orders/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gastropilot}:${POSTGRES_PASSWORD:-gastropilot}@postgres:5432/${POSTGRES_DB:-gastropilot}
      DATABASE_ADMIN_URL: postgresql+asyncpg://${POSTGRES_ADMIN_USER:-gastropilot_admin}:${POSTGRES_ADMIN_PASSWORD:-gastropilot_admin_password}@postgres:5432/${POSTGRES_DB:-gastropilot}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend/services/orders/app:/app/app
      - ./backend/packages:/packages
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/orders/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # AI Service (Sitzplatz-Optimierung, Peak-Prognose, Empfehlungen)
  # ---------------------------------------------------------------------------
  ai:
    build:
      context: ./backend
      dockerfile: services/ai/Dockerfile
    container_name: gp-ai
    restart: unless-stopped
    env_file: ./backend/services/ai/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./backend/services/ai/app:/app/app
      - ./backend/packages:/packages
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/v1/ai/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Notifications Service (E-Mail, Push, SMS via Celery)
  # ---------------------------------------------------------------------------
  notifications:
    build:
      context: ./backend
      dockerfile: services/notifications/Dockerfile
    container_name: gp-notifications
    restart: unless-stopped
    env_file: ./backend/services/notifications/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: development
    volumes:
      - ./backend/services/notifications/app:/app/app
      - ./backend/packages:/packages
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/api/v1/notifications/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # Celery Worker für Notifications
  notifications-worker:
    build:
      context: ./backend
      dockerfile: services/notifications/Dockerfile
    container_name: gp-notifications-worker
    restart: unless-stopped
    env_file: ./backend/services/notifications/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: development
    volumes:
      - ./backend/services/notifications/app:/app/app
      - ./backend/packages:/packages
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: gp-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - core
      - orders
      - ai
      - notifications
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: deps
    container_name: gp-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${HTTP_PORT:-80}
      SSR_API_BASE_URL: http://nginx:80
      NEXT_PUBLIC_API_PREFIX: api/v1
    volumes:
      - ./web/app:/app/app
      - ./web/components:/app/components
      - ./web/lib:/app/lib
      - ./web/hooks:/app/hooks
      - ./web/public:/app/public
      - ./web/tsconfig.json:/app/tsconfig.json
      - ./web/next.config.ts:/app/next.config.ts
      - ./web/postcss.config.mjs:/app/postcss.config.mjs
      - ./web/tailwind.config.ts:/app/tailwind.config.ts
      - /app/node_modules
      - /app/.next
    depends_on:
      - nginx
    command: sh -c "npm install && npm run dev"
    networks:
      - internal

networks:
  internal:
    driver: bridge
    name: gastropilot-dev

volumes:
  postgres_data:
    name: gastropilot-postgres-dev
  redis_data:
    name: gastropilot-redis-dev
